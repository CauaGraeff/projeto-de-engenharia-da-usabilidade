<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anavitória - Notee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>

    <!-- BARRA LATERAL -->
    <aside class="sidebar">
        <div class="top-icons">
            <a href="tela_albuns.html" class="sidebar-icon"><i class="bi bi-house-door-fill"></i></a>
            <a href="config.html" class="sidebar-icon"><i class="bi bi-gear-fill"></i></a>
        </div>
        <div class="bottom-icons">
            <a href="perfil.html" class="sidebar-icon"><i class="bi bi-person-fill"></i></a>
            <a href="index.html" class="sidebar-icon"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </aside>

    <!-- HEADER / TOPO -->
    <header class="cabecalho-principal">
        <div class="cabecalho-esquerdo">
            <img src="imagens/Note-Logo.png" alt="Logo Notee" class="imagem-logo">
        </div>
        <nav class="navegacao-cabecalho">
            <a href="tela_albuns.html" class="item-navegacao">Início</a>
            <a href="albuns.html" class="item-navegacao ativo">Artistas</a>
            <a href="fanClube.html" class="item-navegacao">Fã Clube</a>
            <a href="#" class="item-navegacao">Favoritos</a>
            <a href="config.html" class="item-navegacao">Configurar</a>
        </nav>
        <div class="cabecalho-direito">
            <i class="bi bi-universal-access icone-acessibilidade"></i>
            <i class="bi bi-search icone-busca"></i>
            <a href="perfil.html"><i class="bi bi-person-circle icone-usuario"></i></a>
        </div>
    </header>

    <!-- CONTEÚDO DA PÁGINA DE ARTISTA -->
    <section class="artist-wrapper">

        <!-- CARD DE CABEÇALHO DO ARTISTA -->
        <div class="artist-header">

            <div class="artist-avatar">
                <img src="imagens/AnaVitoriaPrincipal.png" alt="Foto de Anavitória">
            </div>

            <div class="artist-info">
                <h1>ANAVITÓRIA</h1>
                <button class="seguir-btn">Seguir</button>
            </div>

            <div class="artist-stats">
                <div class="artist-stat">
                    <span class="stat-number">25.005</span>
                    <span class="stat-label">Seguidores</span>
                </div>
                <div class="artist-stat">
                    <span class="stat-number">7</span>
                    <span class="stat-label">Álbuns</span>
                </div>
                <div class="artist-stat">
                    <span class="stat-number">243</span>
                    <span class="stat-label">Músicas</span>
                </div>
            </div>

        </div>

        <!-- PAINEL DE ÁLBUNS -->
        <div class="albums-panel">

            <h2 class="albums-title">Álbuns</h2>

            <div class="albums-grid">

                <a href="https://open.spotify.com/intl-pt/album/78YxhXedN9CkDBEvBW7HNm" class="album-card">
                    <div class="album-cover">
                        <img src="imagens/claraboia.jpg" alt="Capa do álbum Claraboia">
                    </div>
                    <span class="album-name">Claraboia</span>
                </a>

                <a href="https://open.spotify.com/intl-pt/album/2DVwOWSHjIm1L6pOm0EGIl" class="album-card">
                    <div class="album-cover">
                        <img src="imagens/esquinas.jpg" alt="Capa do álbum Esquinas">
                    </div>
                    <span class="album-name">Esquinas</span>
                </a>

                <a href="https://open.spotify.com/intl-pt/album/43Q8jiKg8whuFnVCwA1xOC" class="album-card">
                    <div class="album-cover">
                        <img src="imagens/cor.jpg" alt="Capa do álbum Cor">
                    </div>
                    <span class="album-name">Cor</span>
                </a>

            </div>

        </div>

    </section>

</body>
</html>
